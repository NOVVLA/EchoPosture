name: ai-pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: ai-pr-review
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      ${{
        github.event_name == 'pull_request' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          contains(github.event.comment.body, '@ai-review')
        )
      }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run framework
        env:
          AI_API_URL: ${{ secrets.AI_API_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_PR_REVIEW_REASONING_EFFORT: ${{ secrets.AI_PR_REVIEW_REASONING_EFFORT }}
          AI_REVIEW_MODEL: ${{ secrets.AI_REVIEW_MODEL }}
          AI_FAST_MODEL: ${{ secrets.AI_FAST_MODEL }}
          AI_BACKUP_API_URL: ${{ secrets.AI_BACKUP_API_URL }}
          AI_BACKUP_MODEL: ${{ secrets.AI_BACKUP_MODEL }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python .github/ai-flows/pr_review.py
