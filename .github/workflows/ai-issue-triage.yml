name: ai-issue-triage

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    name: ai-issue-triage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      ${{
        github.event_name == 'issues' ||
        (
          github.event_name == 'issue_comment' &&
          !github.event.issue.pull_request &&
          contains(github.event.comment.body, '@ai-issue')
        )
      }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run framework
        env:
          AI_API_URL: ${{ secrets.AI_API_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_REVIEW_MODEL: ${{ secrets.AI_REVIEW_MODEL }}
          AI_FAST_MODEL: ${{ secrets.AI_FAST_MODEL }}
          AI_BACKUP_API_URL: ${{ secrets.AI_BACKUP_API_URL }}
          AI_BACKUP_MODEL: ${{ secrets.AI_BACKUP_MODEL }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python .github/ai-flows/issue_triage.py
