name: codeql

on:
  pull_request:
  push:
  schedule:
    - cron: "24 18 * * 2"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, c-cpp, csharp

      - name: Build launcher and native host
        shell: cmd
        run: build_launcher.cmd

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
