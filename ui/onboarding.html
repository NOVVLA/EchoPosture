<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EchoPosture · ONBOARDING — 弹窗开关 → 主控制台</title>
<style>
  /* ============================================================
     EchoPosture 开场流程示例 — 纯离线 UI 原型
     基于冻结参考 ui/index.html 衍生，新增：
       1. 右下角系统弹窗 + 苹果式滑条开关（旋钮 = 闭眼图标）
       2. 点击 → 旋钮滑动变色，眼睛旋转睁开
       3. 弹窗淡出 → 主 UI 亮起，监测已处于开启状态
     无任何外部字体、库或网络依赖
     ============================================================ */

  :root{
    --silver-hi:#eef1f4;
    --silver:#c3c8cf;
    --silver-lo:#7d838c;
    --line:#d8dde3;
    --line-dim:rgba(216,221,227,.13);   /* 构造圆降为背景暗纹，拉开视觉层级 */
    --red:#ff2f43;
    --red-soft:#ff6473;
    --bg-0:#0c0d0f;
    --ink:#e8ebef;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{ height:100%; }

  body{
    font-family:"Helvetica Neue",Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--ink);
    overflow:hidden;
    /* 深邃的亮光银：深石墨底色 + 偏移的银色高光 + 暗角 */
    background:
      radial-gradient(130% 120% at 32% 18%, #4a4f56 0%, #30343a 28%, #1c1f23 60%, #101113 86%, #08090a 100%);
    position:relative;
  }
  /* 斜向的明亮银光扫光 + 拉丝金属质感 */
  body::before{
    content:"";
    position:absolute; inset:0;
    background:
      linear-gradient(125deg, rgba(255,255,255,.10) 0%, rgba(255,255,255,0) 38%),
      linear-gradient(305deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,0) 42%),
      repeating-linear-gradient(90deg, rgba(255,255,255,.018) 0 1px, rgba(0,0,0,0) 1px 3px);
    pointer-events:none;
    mix-blend-mode:screen;
  }
  /* 暗角 */
  body::after{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(120% 120% at 50% 45%, rgba(0,0,0,0) 52%, rgba(0,0,0,.55) 100%);
    pointer-events:none;
  }

  /* ============================================================
     ① 右下角系统弹窗（开场唯一可见元素）
     ============================================================ */
  .toast{
    position:fixed; right:34px; bottom:34px; z-index:20;
    width:340px;
    padding:20px 22px 22px;
    border-radius:14px;
    overflow:hidden;                       /* 裁切作底的 logo */
    /* 深色玻璃 + logo 蓝图作底：托住质感，又不抢文字 */
    background:linear-gradient(180deg, rgba(20,22,26,.72) 0%, rgba(12,13,16,.86) 100%);
    border:1px solid rgba(255,255,255,.10);
    backdrop-filter:blur(14px);
    box-shadow:0 18px 50px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.06);
    opacity:0; transform:translateY(16px) scale(.985);
    will-change:opacity, transform, filter;
    animation:toastIn .9s cubic-bezier(.22,.61,.36,1) both;
    animation-delay:.45s;
  }
  /* 作底的 logo：右侧侧脸/脊柱蓝图，向左渐隐，给文字让出空间 */
  .toast::before{
    content:"";
    position:absolute; inset:0;
    background:url("../logo.png") no-repeat;
    background-size:auto 152%;
    background-position:118% 38%;
    opacity:.5;
    -webkit-mask-image:linear-gradient(102deg, transparent 0%, transparent 40%, rgba(0,0,0,.55) 74%, #000 100%);
            mask-image:linear-gradient(102deg, transparent 0%, transparent 40%, rgba(0,0,0,.55) 74%, #000 100%);
    pointer-events:none;
  }
  /* 文字与开关浮于 logo 之上 */
  .toast > *{ position:relative; z-index:1; }

  /* 入场：轻微上浮 + 收束 + 柔焦化开，平滑减速、无回弹 */
  @keyframes toastIn{
    from{ opacity:0; transform:translateY(16px) scale(.985); filter:blur(5px); }
    to{   opacity:1; transform:translateY(0)    scale(1);    filter:blur(0); }
  }
  /* 弹窗谢幕：轻沉 + 柔焦淡出 */
  .toast.bye{
    animation:toastOut .52s cubic-bezier(.4,0,.7,.25) forwards;
  }
  @keyframes toastOut{
    from{ opacity:1; transform:translateY(0)    scale(1);    filter:blur(0); }
    to{   opacity:0; transform:translateY(10px) scale(.985); filter:blur(4px); }
  }

  .toast .t-head{
    font-size:10px; letter-spacing:.42em; font-weight:300;
    color:var(--silver-lo);
  }
  .toast .t-title{
    margin-top:10px;
    font-size:15px; letter-spacing:.18em; font-weight:300;
    color:var(--silver-hi);
  }
  .toast .t-sub{
    margin-top:6px;
    font-size:11px; letter-spacing:.12em; line-height:1.8; font-weight:300;
    color:var(--silver-lo);
  }
  .toast .t-row{
    margin-top:16px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .toast .t-state{
    font-size:10px; letter-spacing:.3em; font-weight:300;
    color:var(--silver-lo);
    transition:color .4s ease;
  }
  .toast.armed .t-state{ color:var(--red-soft); }

  /* ---------- 苹果式滑条开关 ---------- */
  .switch{
    position:relative;
    width:66px; height:38px;
    border-radius:19px;
    background:#3a3f47;
    border:1px solid rgba(255,255,255,.12);
    cursor:pointer;
    flex:none;
    transition:background .45s ease, border-color .45s ease, box-shadow .45s ease;
  }
  .switch:hover{ box-shadow:0 0 10px rgba(255,255,255,.18); }
  .switch.on{
    background:linear-gradient(135deg, #ff5a6c 0%, #ff2f43 55%, #c41326 100%);
    border-color:rgba(255,120,135,.6);
    box-shadow:0 0 16px rgba(255,47,67,.45);
  }

  .switch .knob{
    position:absolute; top:3px; left:3px;
    width:30px; height:30px;
    border-radius:50%;
    background:linear-gradient(160deg, #ffffff 0%, #e7eaee 55%, #c9ced5 100%);
    box-shadow:0 2px 6px rgba(0,0,0,.45);
    display:flex; align-items:center; justify-content:center;
    /* 苹果式回弹滑动 */
    transition:transform .5s cubic-bezier(.34,1.3,.4,1);
  }
  .switch.on .knob{ transform:translateX(28px); }

  /* 旋钮里的眼睛：滑动时整体旋转一周 */
  .switch .knob svg{
    width:22px; height:22px; display:block; overflow:visible;
    transform:rotate(0deg);
    transition:transform .6s cubic-bezier(.3,.9,.3,1);
  }
  .switch.on .knob svg{ transform:rotate(360deg); }

  /* 眼形开合：默认压成一条缝，on 时睁开（略滞后于滑动，旋转中睁眼） */
  .switch .k-eye{
    transform:scaleY(.09);
    transform-box:fill-box; transform-origin:center;
    transition:transform .5s cubic-bezier(.34,1.4,.5,1) .18s;
  }
  .switch.on .k-eye{ transform:scaleY(1); }
  .switch .k-iris{
    opacity:0;
    transition:opacity .25s ease .4s;
  }
  .switch.on .k-iris{ opacity:1; }

  /* ============================================================
     ② 主 UI 舞台 — 与冻结参考一致，但初始隐藏，等待弹窗交棒
     ============================================================ */
  .stage{
    position:relative;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1;
    opacity:0;
    transition:opacity 1s ease;
  }
  body.live .stage{ opacity:1; }

  svg.canvas{
    height:96vh;
    max-width:96vw;
    width:auto;
    overflow:visible;
    user-select:none;
  }

  /* ---------- 线稿通用 ---------- */
  .stroke{ fill:none; stroke:var(--line); }
  .thin{ stroke-width:1; stroke-opacity:.5; }   /* 主轴/侧脸线稿同步退后 */
  .hair{ stroke-width:.75; stroke:var(--line-dim); }
  .dot{ stroke-dasharray:1 7; stroke-linecap:round; stroke:var(--line-dim); stroke-width:1; fill:none; }

  /* ---------- 文字标签（颜色更温和的现代无衬线） ---------- */
  .label{
    fill:var(--silver);
    font-size:21px;
    letter-spacing:.62em;
    font-weight:300;
  }
  .tick{
    fill:var(--silver-lo);
    font-size:10px;
    letter-spacing:.34em;
    font-weight:300;
  }

  /* ============================================================
     入场动画（与参考一致，由 body.live 后挂 .play 触发）
     ============================================================ */
  @keyframes drawIn{ to{ stroke-dashoffset:0; } }
  @keyframes fadeUp{ from{ opacity:0; transform:translateY(14px);} to{ opacity:1; transform:translateY(0);} }
  @keyframes fadeIn{ from{ opacity:0;} to{ opacity:1;} }
  @keyframes spinIn{
    from{ opacity:0; transform:rotate(-26deg) scale(.92); }
    to{   opacity:.9; transform:rotate(0deg) scale(1); }
  }
  @keyframes vertIn{
    0%{   opacity:0; transform:translateY(26px) scale(.6); }
    70%{  opacity:1; transform:translateY(-3px) scale(1.04); }
    100%{ opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes breathe{
    0%,100%{ filter:drop-shadow(0 0 0 rgba(255,255,255,0)); }
    50%{ filter:drop-shadow(0 0 6px rgba(255,255,255,.18)); }
  }

  /* 构造圈：以中心自转 */
  .ring{ transform-box:fill-box; transform-origin:center; opacity:0; }
  .play .ring{ animation:spinIn 2.4s cubic-bezier(.16,.8,.27,1) forwards; }
  .play .ring.r2{ animation-delay:.25s; }
  .play .ring.r3{ animation-delay:.45s; }

  /* 描边线：用大 dash 做"绘制"效果 */
  .ink{ stroke-dasharray:4000; stroke-dashoffset:4000; }
  .play .ink{ animation:drawIn 2.2s ease forwards; }
  .play .ink.d1{ animation-delay:.5s; }
  .play .ink.d2{ animation-delay:.8s; }

  /* 标签与刻度 */
  .lab{ opacity:0; }
  .play .lab{ animation:fadeUp .9s ease forwards; }
  .play #oculi.lab{ animation-delay:1.5s; }
  .play #vert.lab{ animation-delay:1.7s; }
  .play .tickline{ opacity:0; animation:fadeIn 1.2s ease forwards; animation-delay:1.6s; }

  /* ---------- 眼睛（纯装饰，始终闭眼，不可点击） ---------- */
  #eyeGroup{ opacity:0; pointer-events:none; }
  .play #eyeGroup{ animation:fadeIn 1s ease forwards; animation-delay:1.2s; }

  /* 始终闭合：纵向压扁成一条杏仁线，不再睁开 */
  #eyeShape{
    transform-box:fill-box;
    transform-origin:center;
    transform:scaleY(.07);
  }
  /* 闭眼态不显示虹膜与柔光 */
  #iris{ opacity:0; }
  #eyeHalo{ opacity:0; pointer-events:none; }

  /* 眼下融入的微型项目名 */
  #eyeword{
    fill:var(--silver-lo);
    font-size:9.5px;
    letter-spacing:.46em;
    font-weight:300;
    pointer-events:none;
  }

  /* ---------- 脊柱（功能开关）---------- */
  .vert{
    cursor:pointer;
    transform-box:fill-box;
    transform-origin:center;
    opacity:0;
  }
  .play .vert{ animation:vertIn 1.05s cubic-bezier(.2,.9,.25,1) forwards; }

  .vert .body{
    transition:filter 480ms ease;
  }
  .vert:hover .body{ filter:drop-shadow(0 0 7px rgba(255,255,255,.45)); }

  /* 点亮态：变红 + 柔光呼吸 */
  .vert.on .body{ animation:breatheRed 3.2s ease-in-out infinite; }
  @keyframes breatheRed{
    0%,100%{ filter:drop-shadow(0 0 6px rgba(255,47,67,.55)); }
    50%{ filter:drop-shadow(0 0 16px rgba(255,47,67,.95)); }
  }
  .vert .fillW{ transition:opacity 520ms ease; }
  .vert .fillR{ opacity:0; transition:opacity 520ms ease; }
  .vert.on .fillW{ opacity:0; }
  .vert.on .fillR{ opacity:1; }

  /* 点击瞬间的柔光环 */
  .flash{
    transform-box:fill-box; transform-origin:center;
    opacity:0; pointer-events:none;
  }
  .vert.flash-on .flash{ animation:flashPop .7s ease-out; }
  @keyframes flashPop{
    0%{ opacity:.8; transform:scale(.5); }
    100%{ opacity:0; transform:scale(2.4); }
  }

  .vert .vlabel{
    fill:var(--silver-lo);
    font-size:9.5px; letter-spacing:.3em; font-weight:300;
    opacity:0; transition:opacity .4s ease, fill .4s ease;
    pointer-events:none;
  }
  .vert:hover .vlabel,
  .vert.on .vlabel{ opacity:1; }
  .vert.on .vlabel{ fill:var(--red-soft); }

  /* ---------- 状态读出面板（live 后才入场） ---------- */
  .readout{
    position:fixed; left:38px; bottom:34px; z-index:5;
    font-weight:300; color:var(--silver);
    opacity:0;
    pointer-events:none;
  }
  body.live .readout{ animation:fadeUp 1s ease forwards; animation-delay:2.1s; }
  .readout .ttl{ font-size:11px; letter-spacing:.42em; color:var(--silver-lo); }
  .readout .state{
    font-size:15px; letter-spacing:.22em; margin-top:8px;
    color:var(--silver-lo); transition:color .4s ease;
  }
  .readout.live .state{ color:var(--silver-hi); }
  .readout .mods{ margin-top:14px; font-size:10.5px; letter-spacing:.18em; line-height:1.9; color:var(--silver-lo); }
  .readout .mods .m{ opacity:.35; transition:opacity .4s ease, color .4s ease; }
  .readout .mods .m.act{ opacity:1; color:var(--red-soft); }
  .readout .mods .m.act::before{ content:"● "; color:var(--red); }
  .readout .mods .m::before{ content:"○ "; }

  .hint{
    position:fixed; right:40px; bottom:34px; z-index:5;
    font-size:10.5px; letter-spacing:.26em; color:var(--silver-lo);
    font-weight:300; opacity:0;
  }
  body.live .hint{ animation:fadeIn 1s ease forwards; animation-delay:2.4s; }
</style>
</head>
<body>

  <!-- ============================================================
       开场弹窗：苹果式滑条 + 闭眼旋钮
       ============================================================ -->
  <div class="toast" id="toast">
    <div class="t-head">ECHOPOSTURE · 系统提醒</div>
    <div class="t-title">开启姿态监测？</div>
    <div class="t-sub">摄像头将以低功耗方式留意你的坐姿，<br>所有数据仅在本机处理。</div>
    <div class="t-row">
      <span class="t-state" id="toastState">监测关闭 · STANDBY</span>
      <div class="switch" id="bootSwitch" role="switch" aria-checked="false" aria-label="开启监测">
        <div class="knob">
          <!-- 旋钮内的迷你眼睛（与主 UI 同款杏仁眼） -->
          <svg viewBox="-50 -34 100 68">
            <g class="k-eye">
              <path d="M -46 0 Q 0 -27 46 0 Q 0 27 -46 0 Z"
                    fill="#0e0f12" stroke="#7d838c" stroke-width="3"/>
              <clipPath id="knobClip"><path d="M -45 0 Q 0 -26 45 0 Q 0 26 -45 0 Z"/></clipPath>
              <g clip-path="url(#knobClip)">
                <rect x="-46" y="-28" width="92" height="56" fill="#eef1f4"/>
                <g class="k-iris">
                  <circle cx="6" cy="0" r="17" fill="url(#knobIris)"/>
                  <circle cx="6" cy="0" r="7.5" fill="#0c0d0f"/>
                  <circle cx="1" cy="-5" r="3" fill="#ffffff" opacity=".9"/>
                </g>
              </g>
              <path d="M -46 0 Q 0 -27 46 0" fill="none" stroke="#3a3f47" stroke-width="3.5" stroke-linecap="round"/>
            </g>
            <defs>
              <radialGradient id="knobIris" cx="50%" cy="45%" r="55%">
                <stop offset="0%"  stop-color="#aeb7c2"/>
                <stop offset="55%" stop-color="#5d646e"/>
                <stop offset="100%" stop-color="#23272d"/>
              </radialGradient>
            </defs>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================
       主 UI 舞台（与冻结参考一致，初始隐藏）
       ============================================================ -->
  <div class="stage">
    <svg class="canvas" viewBox="0 0 1180 1380" id="root">

      <!-- ===== 渐变 / 滤镜定义 ===== -->
      <defs>
        <!-- 椎骨白瓷光泽 -->
        <linearGradient id="vGloss" x1="0" y1="0" x2="0.85" y2="1">
          <stop offset="0%"  stop-color="#ffffff"/>
          <stop offset="42%" stop-color="#e7eaee"/>
          <stop offset="100%" stop-color="#9aa0a8"/>
        </linearGradient>
        <!-- 椎骨点亮红 -->
        <linearGradient id="vRed" x1="0" y1="0" x2="0.85" y2="1">
          <stop offset="0%"  stop-color="#ff8a96"/>
          <stop offset="40%" stop-color="#ff3145"/>
          <stop offset="100%" stop-color="#b00d1d"/>
        </linearGradient>
        <!-- 眼球虹膜 -->
        <radialGradient id="irisGrad" cx="50%" cy="45%" r="55%">
          <stop offset="0%"  stop-color="#aeb7c2"/>
          <stop offset="55%" stop-color="#5d646e"/>
          <stop offset="100%" stop-color="#23272d"/>
        </radialGradient>
        <radialGradient id="halo" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="rgba(255,255,255,.5)"/>
          <stop offset="60%" stop-color="rgba(255,255,255,.08)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
        <radialGradient id="flashG" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="rgba(255,120,135,.9)"/>
          <stop offset="100%" stop-color="rgba(255,47,67,0)"/>
        </radialGradient>
      </defs>

      <!-- ============================================================
           构造蓝图层（圆 / 十字 / 虚线）
           ============================================================ -->
      <g stroke-linecap="round">
        <!-- 头部大圆 -->
        <circle class="ring stroke hair" cx="648" cy="335" r="168"/>
        <!-- 脊柱上的两个交错构造圆，模仿参考图的 S 结构 -->
        <circle class="ring r2 stroke hair" cx="560" cy="640" r="150"/>
        <circle class="ring r3 stroke hair" cx="720" cy="820" r="150"/>
        <ellipse class="ring r3 stroke hair" cx="612" cy="1060" rx="150" ry="92"/>

        <!-- 中央垂直十字主轴 -->
        <line class="ink d1 stroke thin" x1="640" y1="150" x2="640" y2="1190"/>
        <!-- 头顶水平基准 -->
        <line class="ink d1 stroke hair" x1="470" y1="335" x2="820" y2="335"/>
      </g>

      <!-- ============================================================
           头部侧脸线稿
           ============================================================ -->
      <g>
        <!-- 颅顶到额、鼻、唇、颏、颈：一条连续的优雅曲线 -->
        <path class="ink d1 stroke thin" d="
          M 612 196
          C 700 168, 800 220, 812 318
          C 818 372, 806 404, 786 430
          C 800 446, 802 462, 788 470
          C 778 476, 770 472, 766 466
          C 760 488, 742 506, 726 512
          C 740 520, 742 540, 728 556
          C 716 570, 702 600, 700 642
        "/>
        <!-- 后脑到颈背 -->
        <path class="ink d1 stroke thin" d="
          M 612 196
          C 540 224, 500 300, 512 372
          C 520 420, 548 452, 574 470
        "/>
        <!-- 鼻尖小钩 -->
        <path class="ink d2 stroke thin" d="M 786 430 C 792 436, 790 444, 782 446"/>
      </g>

      <!-- ===== OCULI 标签 + 指向眼睛的引线 ===== -->
      <line class="tickline stroke hair" x1="452" y1="332" x2="612" y2="332"/>
      <text id="oculi" class="label lab" x="300" y="340" text-anchor="end">OCULI</text>

      <!-- ===== VERTEBRA 竖排标签 + 刻度引线 ===== -->
      <g id="vert" class="lab">
        <text class="label" x="372" y="560">V</text>
        <text class="label" x="372" y="630">E</text>
        <text class="label" x="372" y="700">R</text>
        <text class="label" x="372" y="770">T</text>
        <text class="label" x="372" y="840">E</text>
        <text class="label" x="372" y="910">B</text>
        <text class="label" x="372" y="980">R</text>
        <text class="label" x="372" y="1050">A</text>
      </g>

      <!-- ============================================================
           眼睛（纯装饰，始终闭眼）：位置复原至原文件 translate(726,332)
           象征性的温和之眼（Benevolent）：细线杏仁轮廓 + 同心圆环虹膜 +
           三道光线短弧，不再写实凝视
           ============================================================ -->
      <g id="eyeGroup" transform="translate(726,332)" aria-hidden="true">
        <!-- 睁眼时的柔光 -->
        <circle id="eyeHalo" cx="0" cy="0" r="58" fill="url(#halo)"/>

        <!-- 眼形：闭合时纵向压扁成一条线 -->
        <g id="eyeShape">
          <!-- 细线杏仁轮廓：半透明底，不用写实眼白 -->
          <path d="M -46 0 Q 0 -28 46 0 Q 0 28 -46 0 Z"
                fill="rgba(14,15,18,.5)" stroke="var(--silver)" stroke-width="1.6"
                stroke-linejoin="round"/>
          <!-- 上方三道温和的光线短弧 -->
          <g stroke="var(--silver-lo)" stroke-width="1.1" stroke-linecap="round" fill="none">
            <path d="M -28 -23 Q -31 -28 -34 -32"/>
            <line x1="0" y1="-31" x2="0" y2="-39"/>
            <path d="M 28 -23 Q 31 -28 34 -32"/>
          </g>
          <!-- 象征性虹膜：同心圆环 + 圆点 + 微光，居中不偏视 -->
          <g id="iris">
            <circle cx="0" cy="0" r="14" fill="none" stroke="#aeb7c2" stroke-width="1.4"/>
            <circle cx="0" cy="0" r="6.5" fill="#c3c8cf"/>
            <circle cx="-3" cy="-3.5" r="1.8" fill="#ffffff" opacity=".9"/>
          </g>
        </g>

        <!-- 融入的微型项目名 -->
        <text id="eyeword" x="0" y="66" text-anchor="middle">ECHOPOSTURE</text>
      </g>

      <!-- ============================================================
           脊柱：功能开关由 JS 生成并挂入此层
           ============================================================ -->
      <g id="spine"></g>

    </svg>
  </div>

  <!-- 状态读出 -->
  <div class="readout" id="readout">
    <div class="ttl">SYSTEM</div>
    <div class="state" id="stateText">监测已暂停 · STANDBY</div>
    <div class="mods" id="modList"></div>
  </div>
  <div class="hint">点击椎骨切换功能</div>

<script>
/* ============================================================
   EchoPosture 开场流程示例 · 交互逻辑（纯前端，无外部依赖）
   流程：弹窗滑条开启 → 弹窗谢幕 → 主 UI 入场（监测已开启）
   ============================================================ */
(function(){
  const SVGNS = "http://www.w3.org/2000/svg";
  const spine = document.getElementById("spine");

  // 7 节椎骨 → 7 个核心功能，沿 S 形脊柱自上而下排布
  // x,y 为中心坐标，rot 为倾角（贴合脊柱曲线）
  const VERTEBRAE = [
    { id:"calib",  name:"CALIBRATION", cn:"启动校准",        x:596, y:486, rot:-12 },
    { id:"prec",   name:"PRECISION",   cn:"高精度评分",      x:606, y:574, rot:2   },
    { id:"perf",   name:"PERFORMANCE", cn:"72FPS 采集",      x:634, y:662, rot:14  },
    { id:"dim",    name:"DIMMING",     cn:"压暗干预",        x:658, y:752, rot:9   },
    { id:"blur",   name:"BLUR",        cn:"GPU 模糊",        x:648, y:844, rot:-7  },
    { id:"pres",   name:"PRESENCE",    cn:"离开/多人检测",   x:620, y:936, rot:-17 },
    { id:"ident",  name:"IDENTITY",    cn:"换人保护",        x:600, y:1026,rot:-11 },
  ];

  // 椎骨"透镜"主体形状（横向，中心在原点，约 152×64）——复刻自冻结参考 index.html
  const VERT_PATH = "M -76 0 C -52 -32, 52 -32, 76 0 C 52 32, -52 32, -76 0 Z";
  // 顶部高光（更小的透镜）
  const GLOSS_PATH = "M -58 -7 C -38 -22, 38 -22, 58 -7 C 38 -14, -38 -14, -58 -7 Z";

  function el(tag, attrs){
    const n = document.createElementNS(SVGNS, tag);
    for(const k in attrs) n.setAttribute(k, attrs[k]);
    return n;
  }

  const state = { eye:false, on:new Set() };

  // ---- 构建每节椎骨 ----
  // 注意：定位（translate/rotate）放在外层 g 的属性上；CSS 入场/缩放动画作用于
  // 内层 g。否则 CSS transform 会覆盖 SVG 的 transform 属性，导致定位失效。
  VERTEBRAE.forEach((v, i) => {
    const pos = el("g", { transform:`translate(${v.x} ${v.y}) rotate(${v.rot})` });
    const g = el("g", { class:"vert", id:"v-"+v.id,
      style:`animation-delay:${1.45 + i*0.12}s` });

    // 点击柔光环
    g.appendChild(el("circle", { class:"flash", cx:0, cy:0, r:60, fill:"url(#flashG)" }));

    const body = el("g", { class:"body" });
    // 白瓷态
    body.appendChild(el("path", { class:"fillW", d:VERT_PATH, fill:"url(#vGloss)",
      stroke:"rgba(255,255,255,.55)", "stroke-width":".75" }));
    // 红色态（叠加，初始透明）
    body.appendChild(el("path", { class:"fillR", d:VERT_PATH, fill:"url(#vRed)",
      stroke:"rgba(255,120,135,.7)", "stroke-width":".75" }));
    // 高光
    body.appendChild(el("path", { class:"fillW", d:GLOSS_PATH, fill:"rgba(255,255,255,.55)" }));
    g.appendChild(body);

    // 引线 + 标签（向左指向 VERTEBRA 文字一侧）
    g.appendChild(el("line", { class:"vlabel", x1:-78, y1:0, x2:-150, y2:0,
      stroke:"currentColor", "stroke-width":".75", "stroke-dasharray":"1 5" }));
    const t = el("text", { class:"vlabel", x:-158, y:3.5, "text-anchor":"end" });
    t.textContent = v.name;
    g.appendChild(t);

    g.addEventListener("click", (e)=>{ e.stopPropagation(); toggleVert(v, g); });
    pos.appendChild(g);
    spine.appendChild(pos);
  });

  // ---- 椎骨开关 ----
  function toggleVert(v, g){
    if(!state.eye) return;     // 监测未开启时不响应（开关在弹窗，不在此处）
    const now = !state.on.has(v.id);
    if(now) state.on.add(v.id); else state.on.delete(v.id);
    g.classList.toggle("on", now);

    // 触发一次柔光环
    g.classList.remove("flash-on");
    void g.offsetWidth;                 // 重排以重启动画
    g.classList.add("flash-on");
    setTimeout(()=>g.classList.remove("flash-on"), 720);

    updateReadout();
  }

  // ---- 监测状态（开关在弹窗；这里的眼睛仅作装饰，始终闭眼且不可点击） ----
  function setEye(open){
    state.eye = open;
    if(!open){
      // 关闭监测：所有椎骨随之熄灭
      state.on.clear();
      document.querySelectorAll(".vert.on").forEach(n=>n.classList.remove("on"));
    }
    updateReadout();
  }

  // ---- 状态读出 ----
  const readout   = document.getElementById("readout");
  const stateText = document.getElementById("stateText");
  const modList   = document.getElementById("modList");

  // 初始化模块列表
  VERTEBRAE.forEach(v=>{
    const div = document.createElement("div");
    div.className = "m"; div.id = "m-"+v.id;
    div.textContent = v.name + "  " + v.cn;
    modList.appendChild(div);
  });

  function updateReadout(){
    readout.classList.toggle("live", state.eye);
    if(!state.eye){
      stateText.textContent = "监测已暂停 · STANDBY";
    }else{
      const n = state.on.size;
      stateText.textContent = n>0
        ? `监测中 · ${n} 项功能已启用`
        : "监测中 · 等待启用功能";
    }
    VERTEBRAE.forEach(v=>{
      document.getElementById("m-"+v.id)
        .classList.toggle("act", state.eye && state.on.has(v.id));
    });
  }

  /* ============================================================
     开场流程：弹窗滑条 → 主 UI
     时间轴（自点击起）：
       0ms    旋钮滑动 + 轨道变红 + 眼睛旋转睁开
       820ms  弹窗轻沉柔焦淡出（动画收尾后再谢幕，让睁眼被看完整）
       1380ms 谢幕(.52s)播完后隐藏，主 UI 淡入 + .play 入场，眼睛已是睁开态
     ============================================================ */
  const toast      = document.getElementById("toast");
  const bootSwitch = document.getElementById("bootSwitch");
  const toastState = document.getElementById("toastState");
  let booted = false;

  bootSwitch.addEventListener("click", ()=>{
    if(booted) return;          // 只走一次开场，防连点
    booted = true;

    bootSwitch.classList.add("on");
    bootSwitch.setAttribute("aria-checked", "true");
    toast.classList.add("armed");
    toastState.textContent = "监测开启 · LIVE";

    // 睁眼动画看完整后，弹窗谢幕
    setTimeout(()=>{ toast.classList.add("bye"); }, 820);

    setTimeout(()=>{
      toast.style.display = "none";

      // 主 UI 亮起：先标记 live（stage 淡入 + 底部读出排队入场），
      // 下一帧再挂 .play 触发蓝图/椎骨入场动画
      document.body.classList.add("live");
      requestAnimationFrame(()=> requestAnimationFrame(()=>{
        document.getElementById("root").classList.add("play");
      }));

      // 监测直接处于开启状态；稍等眼睛 fadeIn 到位再睁开，衔接弹窗里的睁眼
      setTimeout(()=> setEye(true), 1300);
    }, 1380);
  });

  updateReadout();
})();
</script>
</body>
</html>
